<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Images Practice</title>
    <meta name="description" content="Web page used to practice Responsive images for computer and phone">
    <meta name="author" content="Josue Zenif Baez Gomez">
</head>

<body>
    <main>
        <div class="hero">
            <picture>
                <source srcset="images/hero-large.webp" media="(min-width: 800px)">
                <source srcset="images/hero-medium.webp" media="(min-width: 600px)">
                <img src="images/hero-small.webp" alt="Payson Utah Temple Angel Moroni" width="500" height="250">
            </picture>

        </div>
    </main>

</body>

</html>
